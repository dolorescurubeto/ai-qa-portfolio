name: AI QA pytest suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Generate go/no-go pack (no nested pytest)
        run: python week12-go-no-go/go_no_go_pack.py
        env:
          SKIP_PYTEST_IN_PACK: "1"
